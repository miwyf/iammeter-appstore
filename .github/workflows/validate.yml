name: Validate & Publish (Auto)

on:
  pull_request:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Validate manifests
        run: npm run validate:manifests

      - name: Validate screenshots
        run: npm run validate:screenshots

      # Generate apps/index.json (do NOT commit)
      - name: Generate apps index
        run: npm run generate:app-index

  publish-pages:
    name: Publish Apps Index (Auto)
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    concurrency:
      group: "pages"
      cancel-in-progress: true

    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      # Re-generate apps/index.json for the published artifact
      - run: npm run generate:app-index

      - uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    name: Deploy GitHub Pages
    needs: publish-pages
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      - uses: actions/deploy-pages@v4